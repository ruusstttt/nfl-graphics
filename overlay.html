<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NFL Premium Broadcast 1920x300</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
        
        body {
            width: 1920px;
            height: 300px;
            overflow: hidden;
            position: relative;
            background-color: #030303;
            background-image: 
                radial-gradient(circle at 10% 5%, rgba(255, 255, 255, 0.35) 0%, transparent 45%),
                radial-gradient(circle at 90% 5%, rgba(255, 255, 255, 0.35) 0%, transparent 45%);
        }

        body::before {
            content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 85px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.06) 0%, rgba(0,0,0,1) 100%);
            border-top: 1px solid rgba(255,255,255,0.15); box-shadow: inset 0 20px 50px rgba(0,0,0,0.5); z-index: 0;
        }

        .main-container { width: 1920px; height: 300px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; position: relative; z-index: 5; padding-top: 15px; padding-bottom: 10px; }

        .header { display: flex; align-items: center; justify-content: center; gap: 20px; width: 100%; }
        .header-line { height: 1px; width: 220px; background: linear-gradient(90deg, transparent, #d4af37); }
        .header-line.right { background: linear-gradient(270deg, transparent, #d4af37); }
        .header-text { color: #fff; font-size: 18px; font-weight: 800; letter-spacing: 12px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0,0,0,0.8); }

        .matchup-area { position: relative; width: 1920px; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        
        .glow-line { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 1400px; height: 2px; background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.9), transparent); box-shadow: 0 0 20px #d4af37; z-index: 1; }

        .at-badge-outer { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 115px; height: 115px; border-radius: 50%; background: linear-gradient(135deg, #f3e5ab, #8a6d1c, #d4af37); display: flex; align-items: center; justify-content: center; z-index: 4; box-shadow: 0 0 30px rgba(0,0,0,0.9), 0 0 20px rgba(212, 175, 55, 0.3); }
        .at-badge-inner { width: 101px; height: 101px; border-radius: 50%; background: #080808; display: flex; align-items: center; justify-content: center; border: 2px solid #1a1a1a; }
        .at-badge-text { color: #fff; font-size: 65px; font-weight: 900; font-family: 'Arial Black', sans-serif; margin-top: -4px; text-shadow: 0 0 15px rgba(255,255,255,0.7); }

        .logo-wrapper { position: absolute; top: 50%; transform: translateY(-50%); z-index: 3; display: flex; align-items: center; }
        .logo-wrapper.left { right: calc(50% + 130px); justify-content: flex-end; }
        .logo-wrapper.right { left: calc(50% + 130px); justify-content: flex-start; }
        
        .logo { max-height: 200px; max-width: 500px; object-fit: contain; animation: glowPulse 2.5s infinite alternate ease-in-out; }

        .dashboard-outer { width: 800px; height: 80px; background: linear-gradient(to bottom, #d4af37, #8a6d1c); clip-path: polygon(4% 0, 96% 0, 100% 100%, 0 100%); padding: 2px; z-index: 4; box-shadow: 0 10px 20px rgba(0,0,0,0.8); }
        .dashboard-inner { width: 100%; height: 100%; background: #0a0a0a; clip-path: polygon(4% 0, 96% 0, 100% 100%, 0 100%); display: flex; align-items: center; justify-content: space-evenly; }

        .dash-col { display: flex; flex-direction: column; align-items: center; width: 330px; }
        .dash-divider { width: 1px; height: 50px; background: linear-gradient(to bottom, transparent, #d4af37, transparent); }
        .dash-title { color: #d4af37; font-size: 14px; font-weight: 900; letter-spacing: 6px; margin-bottom: 4px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        .dash-value-box { width: 280px; height: 40px; border: 1px solid rgba(212, 175, 55, 0.25); display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); }
        .dash-value { color: #fff; font-size: 22px; font-weight: bold; font-family: 'Arial Black', sans-serif; text-transform: uppercase; }

        @keyframes glowPulse { 0% { filter: drop-shadow(0px 0px 15px rgba(255, 255, 200, 0.4)) drop-shadow(0px 0px 5px rgba(255, 255, 255, 0.2)); } 100% { filter: drop-shadow(0px 0px 40px rgba(255, 255, 200, 0.9)) drop-shadow(0px 0px 15px rgba(255, 255, 255, 0.6)); } }
        .fade-data { transition: opacity 0.3s ease-in-out; opacity: 1; }
        .fade-data.hidden { opacity: 0; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header">
            <div class="header-line"></div>
            <div class="header-text">Weekly Matchup</div>
            <div class="header-line right"></div>
        </div>

        <div class="matchup-area">
            <div class="glow-line"></div>
            <div class="logo-wrapper left"><img id="away-logo" src="" class="logo fade-data"></div>
            <div class="at-badge-outer"><div class="at-badge-inner"><span class="at-badge-text">@</span></div></div>
            <div class="logo-wrapper right"><img id="home-logo" src="" class="logo fade-data"></div>
        </div>

        <div class="dashboard-outer">
            <div class="dashboard-inner">
                <div class="dash-col">
                    <div class="dash-title">SPREAD</div>
                    <div class="dash-value-box"><span id="spread-val" class="dash-value fade-data">-</span></div>
                </div>
                <div class="dash-divider"></div>
                <div class="dash-col">
                    <div class="dash-title">PICK</div>
                    <div class="dash-value-box"><span id="pick-val" class="dash-value fade-data">-</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === UPDATE THIS LINK WITH YOUR GOOGLE SHEET CSV LINK ===
        const googleSheetCSV_URL = https://docs.google.com/spreadsheets/d/e/2PACX-1vRM5gNb9e_eoC_YH6sqOZ9u2zjm3hjFWrympPIhGjWaGpKYg62tpNPKnVhDDuuAn-QfMsVdKgqwdWrr/pub?output=csv;
        
        let nflMatchups = [];

        // Function to download data from Google Sheets
        async function fetchMatchups() {
            try {
                const response = await fetch(googleSheetCSV_URL);
                const data = await response.text();
                
                const rows = data.split('\n');
                nflMatchups = []; 
                
                // Start from i=1 to skip the header row
                for (let i = 1; i < rows.length; i++) {
                    const columns = rows[i].split(',');
                    if (columns.length >= 4) {
                        nflMatchups.push({
                            awayLogo: columns[0].trim(),
                            homeLogo: columns[1].trim(),
                            spread: columns[2].trim(),
                            pick: columns[3].trim()
                        });
                    }
                }
            } catch (error) {
                console.error("Error fetching Google Sheet:", error);
            }
        }

        async function loadGame(gameNumber) {
            // Download data if we don't have it yet
            if (nflMatchups.length === 0) {
                await fetchMatchups();
            }

            const matchData = nflMatchups[gameNumber - 1];

            if (matchData) {
                const awayLogo = document.getElementById('away-logo');
                const homeLogo = document.getElementById('home-logo');
                const spreadVal = document.getElementById('spread-val');
                const pickVal = document.getElementById('pick-val');

                awayLogo.classList.add('hidden');
                homeLogo.classList.add('hidden');
                spreadVal.classList.add('hidden');
                pickVal.classList.add('hidden');

                setTimeout(() => {
                    awayLogo.src = "nfl_team_logos_sem_fundo/" + matchData.awayLogo;
                    homeLogo.src = "nfl_team_logos_sem_fundo/" + matchData.homeLogo;
                    spreadVal.innerText = matchData.spread || "";
                    pickVal.innerText = matchData.pick || "";
                    
                    awayLogo.classList.remove('hidden');
                    homeLogo.classList.remove('hidden');
                    spreadVal.classList.remove('hidden');
                    pickVal.classList.remove('hidden');
                }, 300);
            }
        }

        window.onload = async function() {
            // Wait for the data to download first
            await fetchMatchups();

            const urlParams = new URLSearchParams(window.location.search);
            let defaultGame = parseInt(urlParams.get('game')) || 1;
            loadGame(defaultGame);

            if (window.obsstudio) {
                window.addEventListener('obsSceneChanged', function(event) {
                    const sceneName = event.detail.name;
                    const foundNumber = sceneName.match(/\d+/); 
                    if (foundNumber) {
                        loadGame(parseInt(foundNumber[0]));
                    }
                });

                window.obsstudio.getCurrentScene(function(scene) {
                    const foundNumber = scene.name.match(/\d+/);
                    if (foundNumber) {
                        loadGame(parseInt(foundNumber[0]));
                    }
                });
            }
        };
    </script>
</body>
</html>
